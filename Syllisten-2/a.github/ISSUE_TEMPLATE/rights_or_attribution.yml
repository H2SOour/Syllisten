name: Rights or attribution concern
description: Report a copyright, trademark, privacy, or attribution concern
title: "[Rights/Attribution] "
labels: [legal, attribution]
body:
  - type: textarea
    attributes:
      label: Material or component
    validations:
      required: true
  - type: textarea
    attributes:
      label: Basis of concern
    validations:
      required: true
  - type: textarea
    attributes:
      label: Requested action
    validations:
      required: true
  - type: markdown
    attributes:
      value: Do not publish credentials or sensitive evidence in a public issue. Contact the owner privately when necessary.
