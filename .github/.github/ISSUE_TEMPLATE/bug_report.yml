name: Bug report
description: Report a reproducible problem
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    attributes:
      label: Description
    validations:
      required: true
  - type: input
    attributes:
      label: Version or commit
  - type: dropdown
    attributes:
      label: Mode
      options: [Rule-based mode, User-owned OpenAI API-key mode, Both]
  - type: textarea
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    attributes:
      label: Environment
  - type: checkboxes
    attributes:
      label: Safety check
      options:
        - label: I removed API keys, passwords, personal data, and confidential text.
          required: true
